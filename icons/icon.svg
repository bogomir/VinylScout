<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="vinyl-grad" cx="38%" cy="34%" r="70%">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="label-grad" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#f0607a"/>
      <stop offset="100%" stop-color="#c02a48"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Vinyl disc -->
  <circle cx="64" cy="64" r="60" fill="url(#vinyl-grad)" filter="url(#shadow)"/>

  <!-- Groove rings -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="52" fill="none" stroke="#202020" stroke-width="1"/>
  <circle cx="64" cy="64" r="48" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="44" fill="none" stroke="#202020" stroke-width="1"/>
  <circle cx="64" cy="64" r="40" fill="none" stroke="#1d1d1d" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="36" fill="none" stroke="#202020" stroke-width="1"/>

  <!-- Label -->
  <circle cx="64" cy="64" r="28" fill="url(#label-grad)"/>

  <!-- Label inner detail ring -->
  <circle cx="64" cy="64" r="22" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>

  <!-- Center hole -->
  <circle cx="64" cy="64" r="5.5" fill="#e8e8e8"/>
  <circle cx="64" cy="64" r="4" fill="#d0d0d0"/>

  <!-- Specular highlight on vinyl surface -->
  <ellipse cx="40" cy="34" rx="16" ry="9"
    fill="rgba(255,255,255,0.05)"
    transform="rotate(-30 40 34)"/>

  <!-- Subtle shine on label -->
  <ellipse cx="56" cy="56" rx="8" ry="5"
    fill="rgba(255,255,255,0.12)"
    transform="rotate(-20 56 56)"/>
</svg>
