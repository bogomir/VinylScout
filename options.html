<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>VinylScout — Настройки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      max-width: 540px;
      margin: 48px auto;
      padding: 0 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      background: #111;
      color: #ddd;
    }
    h1 {
      color: #e94560;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #555;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .field { margin-bottom: 20px; }
    label {
      display: block;
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #2a2a40;
      border-radius: 7px;
      color: #eee;
      font-size: 14px;
    }
    input:focus {
      outline: none;
      border-color: #e94560;
    }
    .hint {
      font-size: 12px;
      color: #444;
      margin-top: 6px;
      line-height: 1.5;
    }
    .hint a { color: #e94560; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }
    button {
      margin-top: 8px;
      padding: 11px 24px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover { background: #c73652; }
    button:disabled { opacity: 0.6; cursor: default; }
    .message {
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.5;
      min-height: 20px;
    }
    .message.ok { color: #1e9b5c; }
    .message.err { color: #e94560; }
  </style>
</head>
<body>
  <h1>VinylScout</h1>
  <p class="subtitle">Настройки подключения к Discogs</p>

  <div class="field">
    <label>Personal Access Token</label>
    <input type="password" id="token" placeholder="Вставь токен сюда" autocomplete="off">
    <p class="hint">
      Получить токен:
      <a href="https://www.discogs.com/settings/developers" target="_blank">
        discogs.com/settings/developers
      </a>
      → кнопка «Generate new token»
    </p>
  </div>

  <div class="field">
    <label>Username (логин на Discogs)</label>
    <input type="text" id="username" placeholder="твой_логин">
    <p class="hint">Виден в адресной строке твоего профиля: discogs.com/user/<strong>username</strong></p>
  </div>

  <button id="save-btn">Сохранить и проверить</button>
  <div class="message" id="message"></div>

  <script src="options.js"></script>
</body>
</html>
