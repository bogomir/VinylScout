<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 260px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #1a1a2e;
      color: #ddd;
    }
    h2 {
      font-size: 16px;
      color: #e94560;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .ok { color: #1e9b5c; }
    .warn { color: #e94560; }
    strong { color: #eee; font-weight: 500; }
    .hint {
      font-size: 11px;
      color: #444;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    button {
      display: block;
      width: 100%;
      padding: 9px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h2>VinylScout</h2>
  <div class="status" id="status">Загрузка...</div>
  <p class="hint" id="hint"></p>
  <button id="settings-btn">Настройки</button>
  <script src="popup.js"></script>
</body>
</html>
